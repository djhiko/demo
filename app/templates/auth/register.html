<!-- Наследуемся от базового шаблона -->
{% extends "base.html" %}
<!-- Подключаем CSS для модуля аутентификации (страница входа и регистрации) -->
{% block styles %}
<link rel="stylesheet" href="/static/styles/auth.css" />
{% endblock %}

<!-- prettier ignore -->
{% block content %}
<div class="page-shell auth">
  <form class="auth-form surface-form" method="post" action="/auth/register">
    <div class="auth-form__field">
      <label for="login" class="auth-form__label">Логин</label>
      <input
        id="login"
        class="auth-form__input"
        name="login"
        type="text"
        pattern="^[A-Za-z0-9_.-]{6,255}$"
        title="От 6 символов: латиница, цифры, _ . -"
        autocomplete="username"
        minlength="6"
        maxlength="255"
        required
      />
    </div>
    <div class="auth-form__field">
      <label for="password" class="auth-form__label">Пароль</label>
      <input
        id="password"
        class="auth-form__input"
        name="password"
        type="password"
        pattern="^(?=.*[A-Za-z])(?=.*\d).{8,255}$"
        title="Минимум 8 символов, обязательно буквы и цифры"
        autocomplete="new-password"
        minlength="8"
        maxlength="255"
        required
      />
    </div>
    <div class="auth-form__field">
      <label for="last_name" class="auth-form__label">Фамилия</label>
      <input
        id="last_name"
        class="auth-form__input"
        name="last_name"
        type="text"
        pattern="^[A-Za-zА-Яа-яЁё\-\s]{2,255}$"
        title="Только буквы, пробел или дефис"
        autocomplete="family-name"
        maxlength="255"
        required
      />
    </div>

    <div class="auth-form__field">
      <label for="first_name" class="auth-form__label">Имя</label>
      <input
        id="first_name"
        class="auth-form__input"
        name="first_name"
        type="text"
        pattern="^[A-Za-zА-Яа-яЁё\-\s]{2,255}$"
        title="Только буквы, пробел или дефис"
        autocomplete="given-name"
        maxlength="255"
        required
      />
    </div>
    <div class="auth-form__field">
      <label for="patronymic" class="auth-form__label">Отчество</label>
      <input
        id="patronymic"
        class="auth-form__input"
        name="patronymic"
        type="text"
        pattern="^[A-Za-zА-Яа-яЁё\-\s]{2,255}$"
        title="Только буквы, пробел или дефис"
        autocomplete="additional-name"
        maxlength="255"
        required
      />
    </div>
    <div class="auth-form__field">
      <label for="phone_number" class="auth-form__label"
        >Контактный номер телефона</label
      >
      <input
        id="phone_number"
        class="auth-form__input"
        name="phone_number"
        type="tel"
        pattern="^\+?[0-9]{10,15}$"
        title="Введите номер в формате +79991234567"
        autocomplete="tel"
        maxlength="20"
        required
      />
    </div>
    <div class="auth-form__field">
      <label for="email" class="auth-form__label">Email</label>
      <input
        id="email"
        class="auth-form__input"
        name="email"
        type="email"
        autocomplete="email"
        maxlength="255"
        required
      />
    </div>
    {% if error_message %}
    <div class="auth-form__field">{% include "components/error.html" %}</div>
    {% endif %}
    <div class="auth-form__field">
      <button class="auth-form__submit submit">Зарегистрироваться</button>
    </div>
    <p class="auth-form__hint">
      Уже есть аккаунт?
      <a class="auth-form__link" href="/auth/login">Перейти ко входу</a>
    </p>
  </form>
</div>
{% endblock %}
