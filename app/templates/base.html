<!-- Базовый html-документ, от которого будут наследоваться другие страницы -->

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учусь.РФ</title>
    <!-- Подключаем базовые CSS стили -->
    <link rel="stylesheet" href="/static/styles/base.css" />
    <!-- Блок styles, в который будут подключаться каскадные таблицы стилей для уникальных страниц -->
    {% block styles %} {% endblock %}
  </head>
  <body>
    <header class="topbar">
      <a class="topbar__brand" href="/profile">Учусь.РФ</a>

      <nav class="topbar__nav">
        {% if request.session.get("user_id") %}
        <a class="topbar__link" href="/profile">Профиль</a>
        {% if request.session.get("role") == "admin" %}
        <a class="topbar__link" href="/admin">Панель администратора</a>
        {% endif %}

        <form class="topbar__logout-form" action="/auth/logout" method="post">
          <button class="topbar__logout" type="submit">Выйти</button>
        </form>
        {% else %}
        <a class="topbar__link" href="/auth/login">Вход</a>
        <a class="topbar__link" href="/auth/register">Регистрация</a>
        {% endif %}
      </nav>
    </header>

    <main class="app-content">
      <!-- Блок content, в котором будет лежать контент каждой страницы -->
      {% block content %}{% endblock %}
    </main>

    <!-- Подключаем базовый JS скрипт -->
    <script src="/static/scripts/base.js"></script>
    <!-- Блок scripts, в который будут подключаться скрипты для уникальных страниц -->
    {% block scripts %} {% endblock %}
  </body>
</html>
